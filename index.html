
<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />

    <!-- FULLSCREEN META -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <title>Bank App</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: manipulation;
        font-family: sans-serif;
      }

      .screen {
        width: 100vw;
        height: 100dvh; /* 🔥 real fullscreen */
        position: relative;
      }

      .screen img {
        width: 100%;
        height: 100%;
        object-fit: fill; /* şəkil tam otursun */
      }

      .click-area {
        position: absolute;
        cursor: pointer;
      }

      /* BUTTON AREAS */
      .btn-transfer {
        top: 36%;
        left: 5%;
        width: 25%;
        height: 10%;
      }

      .btn-payment {
        top: 36%;
        left: 37%;
        width: 25%;
        height: 10%;
      }

      .btn-history {
        top: 36%;
        right: 5%;
        width: 25%;
        height: 10%;
      }

      .card-area {
        top: 50%;
        left: 3%;
        width: 94%;
        height: 12%;
      }

      /* klik feedback (gizli amma hiss olunur) */
      .click-area:active {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>

  <body>
    <div class="screen">
      <img src="bank.png" alt="Bank App" />

      <div class="click-area btn-transfer" onclick="goPage('2.html')"></div>
      <div
        class="click-area btn-payment"
        onclick="goPage('payment.html')"
      ></div>
      <div
        class="click-area btn-history"
        onclick="goPage('history.html')"
      ></div>
      <div class="click-area card-area" onclick="goPage('2.html')"></div>
    </div>

    <script>
      function goPage(page) {
        // smooth keçid effekti
        document.body.style.opacity = "0";
        setTimeout(() => {
          window.location.href = page;
        }, 150);
      }

      // URL bar gizlətmək (Plinko trick)
      function hideURLbar() {
        window.scrollTo(0, 1);
      }

      window.addEventListener("load", () => {
        setTimeout(hideURLbar, 100);
      });

      // swipe disable (app kimi hiss)
      document.addEventListener(
        "touchmove",
        function (e) {
          e.preventDefault();
        },
        { passive: false },
      );
    </script>
  </body>
</html>
