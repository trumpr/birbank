<!doctype html>
<html lang="az">
<head>
  <meta charset="UTF-8" />

  <!-- FULLSCREEN -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f3f5f9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>Birbank Cashback</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f3f5f9;
      touch-action: manipulation;
    }

    .app {
      height: 100dvh; /* 🔥 REAL FULLSCREEN */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      font-size: 18px;
      background: #f3f5f9;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header .title {
      font-weight: bold;
      font-size: 20px;
      text-align: center;
      flex-grow: 1;
    }

    .card {
      width: 90%; /* 🔥 FIX: əvvəl 25% idi */
      margin: 10px auto;
      background: linear-gradient(135deg, #0f2027, #203a43);
      border-radius: 16px;
      padding: 16px;
      color: white;
      position: relative;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .visa {
      position: absolute;
      right: 15px;
      top: 12px;
      font-weight: bold;
    }

    .red-shape {
      width: 90px;
      height: 30px;
      background: #ff1a1a;
      transform: skewX(-20deg);
      margin: 12px 0;
      border-radius: 4px;
    }

    .balance {
      text-align: center;
      font-size: 32px;
      margin: 20px 0;
      font-weight: bold;
    }

    .actions {
      display: flex;
      justify-content: space-around;
      padding: 0 10px;
    }

    .action {
      background: #fff;
      width: 30%;
      text-align: center;
      padding: 14px 5px;
      border-radius: 16px;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.06);
      font-size: 14px;
      text-decoration: none;
      color: black;
    }

    .action:active {
      transform: scale(0.96);
    }

    .section {
      padding: 15px;
    }

    .section h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .transaction {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      margin-right: 10px;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <span onclick="goBack()">←</span>
    <div class="title">Birbank Cashback</div>
    <span>⤴</span>
  </div>

  <div class="card">
    <div>• 7604</div>
    <div class="visa">VISA</div>
    <div class="red-shape"></div>
    <div>Kart detalları</div>
  </div>

  <div class="balance">2800 ₼</div>

  <div class="actions">
    <a href="3.html" class="action">Köçür</a>
    <div class="action">Ödənişlər</div>
    <div class="action">Balansı artır</div>
  </div>

  <div class="section">
    <h3>Mart ayı üzrə xərclənib: 5 362,32 ₼</h3>

    <div class="small">Bu gün</div>

    <div class="transaction">
      <div class="left">
        <div class="icon" style="background:#eaeaea"></div>
        <div>
          eBay<br>
          <span class="small">Şopinq</span>
        </div>
      </div>
      <div>2 $</div>
    </div>

    <div class="small" style="margin-top:10px">27 Mart</div>

    <div class="transaction">
      <div class="left">
        <div class="icon" style="background:red"></div>
        <div>
          Köçürməni alan<br>
          <span class="small">ELNARA R******</span>
        </div>
      </div>
      <div>30 ₼</div>
    </div>

    <div class="transaction">
      <div class="left">
        <div class="icon" style="background:red"></div>
        <div>
          Köçürməni alan<br>
          <span class="small">Digər istifadəçi</span>
        </div>
      </div>
      <div>472 ₼</div>
    </div>

  </div>

</div>

<script>
  function goBack() {
    history.back();
  }

  // URL bar gizlətmək
  function hideURLbar() {
    window.scrollTo(0, 1);
  }

  window.addEventListener("load", () => {
    setTimeout(hideURLbar, 100);
  });
</script>

</body>
</html>
